name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install deps
        run: npm install

      - name: Add API key
        run: |
          sed -i "s|OPENAI_API_KEY: ''|OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}'|" src/config.ts

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK (GitHub artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Bible-Teacher-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Firebase Auth & Upload
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT" > $HOME/firebase-key.json
            export FIREBASE_APP_DISTRIBUTION_CREDENTIALS=$HOME/firebase-key.json
            cd android
            ./gradlew appDistributionUploadRelease --no-daemon || echo "Firebase upload failed (non-fatal)"
          else
            echo "No Firebase service account - skipping upload"
          fi
