name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install deps
        run: npm install

      - name: Add API key
        run: |
          sed -i "s|OPENAI_API_KEY: ''|OPENAI_API_KEY: '${{ secrets.OPENAI_API_KEY }}'|" src/config.ts

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK (artifact fallback)
        uses: actions/upload-artifact@v4
        with:
          name: Bible-Teacher-APK
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload APK as GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v1.0.${{ github.run_number }}
          name: BibleTeecha v1.0.${{ github.run_number }}
          body: |
            Auto-built APK for BibleTeecha.
            Download app-release.apk below and install on your Android device.
          artifacts: android/app/build/outputs/apk/release/app-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for latest download link
        run: |
          echo "Download URL: https://github.com/${{ github.repository }}/releases/latest/download/app-release.apk"
